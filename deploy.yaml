apiVersion: apps/v1
kind: Deployment
metadata:
  name: securebank-api-deployment
  namespace: secure-core
  labels:
    app.kubernetes.io/component: core-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: securebank-api
  template:
    metadata:
      labels:
        app: securebank-api
    spec:
      containers:
      - name: api-node
        image: securebankregistry.azurecr.io/core/api:v1.0.0
        ports:
        - containerPort: 8000
        # Hardening Container Runtime Permissions
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
          capabilities:
            drop:
            - ALL
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"

        # --- ADD THIS LIVENESS PROBE GATE ---
        livenessProbe:
          httpGet:
            path: /api/docs  # Pings your Swagger endpoint to verify the service is alive
            port: 8000
          initialDelaySeconds: 10 # Gives Uvicorn 10 seconds to spin up before checking
          periodSeconds: 15       # Re-check health every 15 seconds
          timeoutSeconds: 2       # Must respond within 2 seconds
          failureThreshold: 3     # Restart container if it fails 3 consecutive times

        # --- ADD THIS READINESS PROBE GATE ---
        readinessProbe:
          httpGet:
            path: /api/docs  # Verifies application is fully responsive before routing public traffic
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 2

        