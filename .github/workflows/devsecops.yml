# .github/workflows/devsecops-pipeline.yml
name: DevSecOps Automated Security Assurance Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-compliance-scan:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout Code Repository Baseline
      uses: actions/checkout@v4

    # --- 4A. STATIC APPLICATION SECURITY TESTING (SAST) ---
    - name: Run Bandit Security Engine (Python Vulnerability Scan)
      run: |
        pip install bandit
        # Strict checking profile: Ignore low issues (-lll), skip unit tests
        bandit -r ./app -x ./app/test_*.py -lll

    # --- 4B. SOFTWARE SUPPLY CHAIN & CONTAINER CVE SCAN ---
    - name: Build SecureBank Backend Local Target Image
      run: |
        docker build -t securebank-backend-api:test .

    - name: Run Trivy Scanner (Container Layer Vulnerability Verification)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'securebank-backend-api:test'
        format: 'table'
        exit-code: 1 # Strictly block the build if high-risk vulnerabilities are found
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'HIGH,CRITICAL'

    # --- 4C. DYNAMIC APPLICATION SECURITY TESTING (DAST) ---
    - name: Initialize Sandbox Testing Infrastructure Stack
      run: |
        # Tear down any conflicting instances, then spin up the fresh build stack
        docker compose down --volumes --remove-orphans || true
        docker compose up -d --build
        echo "Awaiting cluster endpoint stabilization..."
        sleep 12

    - name: Execute OWASP ZAP API Fuzzing Scan
      run: |
        # Using a universal containerized call to ensure portability between Act and GitHub Runners
        docker run --rm \
          --network="host" \
          -v $(pwd):/zap/wrk:rw \
          ghcr.io/zaproxy/zaproxy:stable zap-api-scan.py \
          -t http://localhost:8000/api/docs \
          -f openapi \
          -r zap_compliance_report.html || true

    - name: Teardown Sandbox Environment Stack
      if: always() # Ensures the containers are ALWAYS cleaned up even if the scan drops out
      run: docker compose down

    # --- 4D. KUBERNETES MANIFEST VALIDATION (OPA / DATREE) ---
    - name: Run Datree Policy Compliance Verification
      run: |
        # Runs containerized to remove requirements for local binary setup installation paths
        if [ -f "deployment.yaml" ]; then
          docker run --rm -v $(pwd):/workspace datree/datree:latest test /workspace/deployment.yaml --schema-version 1.28.0 || true
        else
          echo "No deployment.yaml matched in workspace root."
        fi