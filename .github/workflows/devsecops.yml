# .github/workflows/devsecops-pipeline.yml
name: DevSecOps Automated Security Assurance Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-compliance-scan:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout Code Repository Baseline
      uses: actions/checkout@v4

    # --- 4A. STATIC APPLICATION SECURITY TESTING (SAST) ---
    - name: Run Bandit Security Engine (Python Vulnerability Scan)
      run: |
        pip install bandit
        bandit -r ./app -x ./app/test_*.py

    # --- 4B. SOFTWARE SUPPLY CHAIN & CONTAINER CVE SCAN ---
    - name: Build SecureBank Backend Local Target Image
      run: |
        docker build -t securebank-backend-api:test .

    - name: Run Trivy Scanner (Container Layer Vulnerability Verification)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'securebank-backend-api:test'
        format: 'table'
        exit-code: '1' # Fails the pipeline run if HIGH or CRITICAL severity patches match
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'HIGH,CRITICAL'

    # --- 4C. DYNAMIC APPLICATION SECURITY TESTING (DAST) ---
    - name: Initialize Sandbox Testing Infrastructure Stack
      run: |
        docker compose up -d
        sleep 10 # Allow backend service engines to initialize cleanly

    - name: Execute OWASP ZAP Baseline DAST Assessment
      uses: zaproxy/action-baseline@v0.12.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        target: 'http://localhost:8000/api/docs'
        rules_file_name: '.zap/rules.tsv'
        fail_action: false

    - name: Teardown Sandbox Environment Stack
      run: docker compose down

  # --- 4D. KUBERNETES MANIFEST VALIDATION (OPA / DATREE) ---
  kubernetes-policy-check:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout Code Repository Baseline
      uses: actions/checkout@v4

    - name: Run Datree Policy Compliance Verification
      uses: datreeio/action-datree@main
      with:
        path: 'deployment.yaml'
        cliArguments: '--schema-version 1.28.0'